<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>自動送出 POST 表單（表格格式）</title>
<style>
    table {
      border-collapse: collapse;
      width: 50%;
      margin: 20px auto;
    }
    th, td {
      border: 1px solid #999;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    input[type="text"] {
      width: 100%;
    }
</style>
</head>
<body>
<form id="autoPostForm" method="POST" action="https://finsrv.megabank-t.com.tw/ibaAdapter/edda/web">
<table>
<tr>
<th>欄位名稱</th>
<th>輸入值</th>
</tr>
<tr>
<td>rbanktoken（銀行驗證用 Token）</td>
<td><input type="text" name="rbanktoken" value="07865B43B0A84ED295CEEE77187CDE12"></td>
</tr>
<tr>
<td>eddarbank（目的銀行代碼）</td>
<td><input type="text" name="eddarbank" value=""></td>
</tr>
</table>
 
    <div style="text-align: center;">
<input type="submit" value="點此送出">
</div>
